name = "dsa-bot-worker"
main = "src/index.ts"
compatibility_date = "2026-04-21"

[[d1_databases]]
binding = "DB"
database_name = "dsa-bot"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[queues.producers]]
queue = "broadcast"
binding = "BROADCAST_QUEUE"

[[queues.consumers]]
queue = "broadcast"
max_batch_size = 30
max_batch_timeout = 10

[triggers]
crons = ["0 13 * * *", "30 13 * * *"]
